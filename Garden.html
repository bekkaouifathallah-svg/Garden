<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Garden">
<meta name="theme-color" content="#1A2E18">
<title>Garden</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0E1210;}
body{font-family:-apple-system,'DM Sans',system-ui,sans-serif;max-width:480px;margin:0 auto;overflow-x:hidden;}

/* SAFE AREA */
.safe-top{padding-top:env(safe-area-inset-top,14px);}
.safe-bot{padding-bottom:calc(env(safe-area-inset-bottom,0px) + 72px);}

/* TRANSITIONS */
.page{display:none;animation:fadeIn 0.18s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* TOAST */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);padding:11px 22px;border-radius:14px;font-size:14px;font-weight:600;z-index:999;white-space:nowrap;opacity:0;transition:all 0.3s;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* NAV */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;justify-content:space-around;align-items:center;padding:8px 0;padding-bottom:calc(8px + env(safe-area-inset-bottom,8px));z-index:100;transition:background 0.3s;border-top-width:1.5px;border-top-style:solid;}
.nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 10px;font-family:inherit;}
.nav-btn .nav-emoji{font-size:20px;opacity:0.35;transition:opacity 0.15s;}
.nav-btn .nav-label{font-size:10px;font-weight:500;transition:color 0.15s;letter-spacing:0;}
.nav-btn .nav-dot{width:20px;height:2.5px;border-radius:99px;margin-top:1px;display:none;}
.nav-btn.active .nav-emoji{opacity:1;}
.nav-btn.active .nav-label{font-weight:800;letter-spacing:0.02em;}
.nav-btn.active .nav-dot{display:block;}

/* HERO */
.hero{padding:32px 20px 28px;position:relative;overflow:hidden;}
.hero-leaf1{position:absolute;bottom:-20px;right:-10px;font-size:130px;opacity:0.06;user-select:none;transform:rotate(-20deg);pointer-events:none;}
.hero-leaf2{position:absolute;top:-10px;left:-20px;font-size:100px;opacity:0.05;user-select:none;transform:rotate(15deg);pointer-events:none;}
.hero-inner{position:relative;}
.hero-season{font-size:11px;text-transform:uppercase;letter-spacing:0.14em;font-weight:700;margin-bottom:8px;}
.hero-title{font-size:34px;font-weight:900;font-family:Georgia,serif;line-height:1.05;margin-bottom:16px;}
.hero-box{background:#FFFFFF0E;border-radius:18px;padding:18px;border:1px solid #FFFFFF0A;}
.hero-box-label{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;margin-bottom:4px;}
.hero-total{font-size:46px;font-weight:900;font-family:Georgia,serif;line-height:1;letter-spacing:-0.02em;color:#A8F090;}
.hero-stats{display:flex;gap:16px;margin-top:10px;}
.hero-stat-val{font-size:16px;font-weight:700;}
.hero-stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;}
.hero-sep{width:1px;background:#FFFFFF14;}

/* CARDS */
.section{padding:20px 16px 0;}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;}
.card{border-radius:20px;padding:18px 16px;margin-bottom:12px;border-width:1px;border-style:solid;}
.card-row{display:flex;justify-content:space-between;align-items:flex-start;}
.card-icon{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.card-name{font-size:16px;font-weight:800;font-family:Georgia,serif;}
.card-sub{font-size:11px;margin-top:1px;}
.card-price{font-size:22px;font-weight:900;font-family:Georgia,serif;}
.card-price-sub{font-size:11px;text-align:right;margin-top:1px;}
.bar-wrap{height:8px;border-radius:99px;overflow:hidden;display:flex;margin:12px 0 6px;}
.bar-sold{height:100%;border-radius:99px 0 0 99px;transition:width 0.7s ease;}
.bar-gift{height:100%;transition:width 0.7s ease;}
.bar-legend{display:flex;gap:12px;flex-wrap:wrap;}
.bar-dot{width:8px;height:8px;border-radius:99px;flex-shrink:0;}
.bar-leg-item{display:flex;align-items:center;gap:4px;font-size:10px;}

/* FORM */
.form-tag{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:4px 12px;border-radius:99px;margin-bottom:10px;}
.form-title{font-size:28px;font-weight:900;font-family:Georgia,serif;line-height:1.1;margin-bottom:20px;}
.fruit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.fruit-btn{padding:13px 8px;border-radius:16px;border-width:2px;border-style:solid;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:inherit;transition:all 0.15s;background:none;}
.fruit-btn .fb-emoji{font-size:24px;}
.fruit-btn .fb-label{font-weight:500;font-size:13px;}
.type-row{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;scrollbar-width:none;}
.type-row::-webkit-scrollbar{display:none;}
.type-btn{padding:7px 14px;border-radius:99px;border-width:1.5px;border-style:solid;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;font-size:12px;font-weight:500;transition:all 0.15s;background:none;}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;}
.form-field{margin-bottom:12px;}
.lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;display:block;margin-bottom:5px;}
.inp{width:100%;padding:13px 14px;border-width:1.5px;border-style:solid;border-radius:13px;font-size:15px;font-family:inherit;outline:none;box-sizing:border-box;}
.inp-row{display:flex;gap:6px;}
.btn-main{width:100%;padding:16px;border:none;border-radius:15px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.btn-sec{width:100%;padding:14px;background:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;border-width:1.5px;border-style:solid;margin-top:8px;}
.err-msg{font-size:13px;border-radius:10px;padding:9px 14px;margin-bottom:12px;}

/* HISTORY */
.tog-wrap{display:flex;border-radius:14px;padding:4px;margin-bottom:12px;gap:4px;}
.tog-btn{flex:1;padding:9px 0;border-radius:11px;border:none;font-weight:500;font-size:13px;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-btn{padding:6px 14px;border-radius:99px;border-width:1.5px;border-style:solid;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;font-size:12px;font-weight:500;transition:all 0.15s;background:none;}
.hist-item{border-width:1.5px;border-style:solid;border-radius:16px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.hist-icon{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.hist-name{font-size:14px;font-weight:700;}
.hist-meta{font-size:11px;margin-top:1px;}
.hist-price{font-family:Georgia,serif;font-weight:800;font-size:14px;flex-shrink:0;}
.del-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:4px;line-height:1;flex-shrink:0;}
.empty{text-align:center;font-size:14px;padding:40px 0;font-style:italic;}

/* ANALYSE */
.analyse-box{border-width:1.5px;border-style:solid;border-radius:18px;padding:20px 18px;margin-top:0;}
.analyse-box-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;}
.analyse-text{font-size:15px;line-height:1.75;}
.analyse-reset{margin-top:14px;background:none;border:none;cursor:pointer;font-size:12px;font-family:inherit;padding:0;}

/* DARK MODE toggle */
#dark-toggle{position:fixed;top:calc(14px + env(safe-area-inset-top,0px));right:16px;z-index:200;border-radius:99px;padding:6px 14px;font-size:13px;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px #0000001A;transition:all 0.2s;border-width:1px;border-style:solid;}
</style>
</head>
<body>

<button id="dark-toggle" onclick="toggleDark()"></button>

<!-- ═══ ACCUEIL ═══ -->
<div id="page-accueil" class="page safe-top">
  <div class="hero" id="hero-bg">
    <div class="hero-leaf1">🌿</div>
    <div class="hero-leaf2">🍃</div>
    <div class="hero-inner">
      <div class="hero-season" id="hero-season-lbl"></div>
      <div class="hero-title" id="hero-title-lbl">Garden</div>
      <div class="hero-box">
        <div class="hero-box-label" id="hero-box-lbl"></div>
        <div class="hero-total" id="hero-total">0,00 €</div>
        <div class="hero-stats">
          <div><div class="hero-stat-val" id="stat-kg">0 kg</div><div class="hero-stat-lbl" id="stat-kg-lbl">Récoltés</div></div>
          <div class="hero-sep"></div>
          <div><div class="hero-stat-val" id="stat-nb">0</div><div class="hero-stat-lbl">Ventes</div></div>
          <div class="hero-sep" id="sep-dons" style="display:none"></div>
          <div id="stat-dons-wrap" style="display:none"><div class="hero-stat-val" id="stat-dons">0 kg</div><div class="hero-stat-lbl">Donnés</div></div>
        </div>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="section-label" id="lbl-bilan-fruit"></div>
    <div id="fruit-cards"></div>
    <div id="empty-accueil" class="empty" style="display:none"></div>
  </div>
  <div class="section" id="section-recents" style="display:none">
    <div class="section-label" id="lbl-recents"></div>
    <div id="recent-list"></div>
  </div>
  <div style="height:16px"></div>
</div>

<!-- ═══ RÉCOLTE ═══ -->
<div id="page-recolte" class="page safe-top">
  <div class="section">
    <div class="form-tag" id="recolte-tag"></div>
    <div class="form-title">Nouvelle<br>récolte</div>
    <div class="fruit-grid" id="fruit-grid-r"></div>
    <div class="form-grid2">
      <div><label class="lbl" id="lbl-date-r"></label><input class="inp" type="datetime-local" id="inp-date-r"></div>
      <div><label class="lbl" id="lbl-qte-r"></label><input class="inp" type="number" placeholder="3.5" id="inp-qte-r" min="0" step="0.1"></div>
    </div>
    <div class="form-field"><label class="lbl" id="lbl-note-r"></label><input class="inp" type="text" placeholder="Qualité, météo, remarque…" id="inp-note-r"></div>
    <div class="err-msg" id="err-r" style="display:none"></div>
    <button class="btn-main" id="btn-recolte" onclick="submitRecolte()">🌱 Enregistrer la récolte</button>
  </div>
</div>

<!-- ═══ VENTE ═══ -->
<div id="page-vente" class="page safe-top">
  <div class="section">
    <div class="form-tag" id="vente-tag"></div>
    <div class="form-title">Vente<br>ou don</div>
    <div class="fruit-grid" id="fruit-grid-v"></div>
    <div class="type-row" id="type-row-v"></div>
    <div class="form-grid2">
      <div><label class="lbl" id="lbl-date-v"></label><input class="inp" type="datetime-local" id="inp-date-v"></div>
      <div>
        <label class="lbl" id="lbl-qte-v"></label>
        <div class="inp-row">
          <input class="inp" type="number" placeholder="2" id="inp-qte-v" min="0" step="0.1" style="flex:1">
          <select class="inp" id="inp-unite-v" style="width:90px;flex:none"><option>kg</option><option>pièce(s)</option><option>pot(s)</option></select>
        </div>
      </div>
    </div>
    <div class="form-field" id="prix-field"><label class="lbl" id="lbl-prix-v"></label><input class="inp" type="number" placeholder="6.00" id="inp-prix-v" min="0" step="0.5"></div>
    <div class="form-field"><label class="lbl" id="lbl-info-v"></label><input class="inp" type="text" placeholder="Voisin, marché, famille…" id="inp-info-v"></div>
    <div class="err-msg" id="err-v" style="display:none"></div>
    <button class="btn-main" id="btn-vente" onclick="submitVente()">💰 Enregistrer la vente</button>
  </div>
</div>

<!-- ═══ HISTORIQUE ═══ -->
<div id="page-historique" class="page safe-top">
  <div class="section">
    <div style="font-size:28px;font-weight:900;font-family:Georgia,serif;margin-bottom:16px;" id="hist-title"></div>
    <div class="tog-wrap" id="tog-wrap">
      <button class="tog-btn active" id="tog-ventes" onclick="setVue('ventes')">💰 Ventes &amp; dons</button>
      <button class="tog-btn" id="tog-recoltes" onclick="setVue('recoltes')">🌱 Récoltes</button>
    </div>
    <div class="filter-row" id="filter-row"></div>
    <div id="hist-list"></div>
    <button class="btn-sec" id="btn-export" onclick="exportCSV()" style="display:none"></button>
  </div>
</div>

<!-- ═══ ANALYSE ═══ -->
<div id="page-analyse" class="page safe-top">
  <div class="section">
    <div class="form-tag" id="analyse-tag"></div>
    <div style="font-size:28px;font-weight:900;font-family:Georgia,serif;line-height:1.1;margin-bottom:6px;">Analyse<br>de saison</div>
    <div style="font-size:13px;margin-bottom:20px;line-height:1.6;" id="analyse-intro"></div>
    <div id="analyse-fruit-list" style="margin-bottom:20px;"></div>
    <div id="analyse-empty" class="empty" style="display:none;"></div>
    <button class="btn-main" id="btn-analyse" onclick="lancerAnalyse()" style="display:none;margin-bottom:16px;">✨ Analyser ma saison 2026</button>
    <div class="err-msg" id="err-analyse" style="display:none"></div>
    <div class="analyse-box" id="analyse-result" style="display:none">
      <div class="analyse-box-label" id="analyse-result-lbl"></div>
      <div class="analyse-text" id="analyse-text"></div>
      <button class="analyse-reset" id="analyse-reset" onclick="resetAnalyse()"></button>
    </div>
  </div>
</div>

<!-- ═══ NAVIGATION ═══ -->
<nav id="nav">
  <button class="nav-btn active" data-tab="accueil" onclick="goTab('accueil')">
    <span class="nav-emoji">◉</span><span class="nav-label" id="nl-accueil">Bilan</span><div class="nav-dot"></div>
  </button>
  <button class="nav-btn" data-tab="recolte" onclick="goTab('recolte')">
    <span class="nav-emoji">🌱</span><span class="nav-label" id="nl-recolte">Récolte</span><div class="nav-dot"></div>
  </button>
  <button class="nav-btn" data-tab="vente" onclick="goTab('vente')">
    <span class="nav-emoji">💰</span><span class="nav-label" id="nl-vente">Vente</span><div class="nav-dot"></div>
  </button>
  <button class="nav-btn" data-tab="historique" onclick="goTab('historique')">
    <span class="nav-emoji">≡</span><span class="nav-label" id="nl-hist">Historique</span><div class="nav-dot"></div>
  </button>
  <button class="nav-btn" data-tab="analyse" onclick="goTab('analyse')">
    <span class="nav-emoji">✨</span><span class="nav-label" id="nl-analyse">Analyse</span><div class="nav-dot"></div>
  </button>
</nav>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
// DONNÉES & CONSTANTES
// ═══════════════════════════════════════════════════
const STORAGE_KEY = "garden_2026_v1";

const FRUITS = [
  { id:"figue",  label:"Figues",  emoji:"🌿", color:"#E879A0", colorD:"#C05080", light:"#FDF5F9", lightD:"#2A1020", accent:"#F2C4DC" },
  { id:"raisin", label:"Raisins", emoji:"🍇", color:"#9B7FE8", colorD:"#7B5FC8", light:"#F7F4FD", lightD:"#1A1030", accent:"#C8B0F0" },
  { id:"prune",  label:"Prunes",  emoji:"🍑", color:"#F08050", colorD:"#D06030", light:"#FDF6F0", lightD:"#2A1808", accent:"#F0C090" },
  { id:"poire",  label:"Poires",  emoji:"🍐", color:"#5ACA80", colorD:"#3AAA60", light:"#F2F9EE", lightD:"#0E2018", accent:"#A8D890" },
];
const TYPES = [
  {id:"vrac",      label:"Vrac",        emoji:"⚖️"},
  {id:"caissette", label:"Caissette",   emoji:"📦"},
  {id:"confiture", label:"Confiture",   emoji:"🫙"},
  {id:"don",       label:"Don famille", emoji:"🎁"},
  {id:"autre",     label:"Autre",       emoji:"🛒"},
];

const LT = { bg:"#FAFAF7",card:"#FFFFFF",border:"#E4EAE0",text:"#1A2E18",sub:"#7A8A76",muted:"#B0BCA8",input:"#F4F7F2",navBg:"#FFFFFF",barBg:"#EEF4EA",tag:"#E8F4E0",tagTxt:"#2A5A18",heroSub:"#7AAA70",heroTxt:"#EDFAE8",accentBg:"#EAF7E0",accentBorder:"#B8E0A0",accentTxt:"#2A5A18",activeNav:"#1A2E18" };
const DT = { bg:"#0E1210",card:"#161E14",border:"#243020",text:"#E8F4E4",sub:"#5A7A54",muted:"#344830",input:"#1C2818",navBg:"#121A10",barBg:"#1C2818",tag:"#1A2E16",tagTxt:"#5ACA80",heroSub:"#4A7A44",heroTxt:"#D8F0D0",accentBg:"#0E2A14",accentBorder:"#1A4A20",accentTxt:"#5ACA80",activeNav:"#5ACA80" };

let dark = false;
let recoltes = [];
let ventes   = [];
let selFruitR = "figue";
let selFruitV = "figue";
let selTypeV  = "vrac";
let vueHist   = "ventes";
let filtreHist = "tous";
let analyseText = null;

// ═══════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      recoltes = d.recoltes || [];
      ventes   = d.ventes   || [];
      dark     = d.dark     || false;
    }
  } catch(e) {}
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({recoltes,ventes,dark})); } catch(e) {}
}

// ═══════════════════════════════════════════════════
// UTILITAIRES
// ═══════════════════════════════════════════════════
function fmt(n){ return n.toFixed(2).replace(".",",")+"\u202f€"; }
function nowLocal(){
  const n=new Date(), p=x=>String(x).padStart(2,"0");
  return `${n.getFullYear()}-${p(n.getMonth()+1)}-${p(n.getDate())}T${p(n.getHours())}:${p(n.getMinutes())}`;
}
function fmtDate(iso){
  if(!iso) return "";
  const [d,t]=iso.split("T"), [y,m,dd]=d.split("-");
  return `${dd}/${m}/${y}${t?" "+t.slice(0,5):""}`;
}
function T(){ return dark ? DT : LT; }
function fc(fruit){ return dark ? fruit.colorD : fruit.color; }
function fb(fruit){ return dark ? fruit.lightD : fruit.light; }
function getFruit(id){ return FRUITS.find(f=>f.id===id)||FRUITS[0]; }

function showToast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg;
  el.style.background=dark?"#1C2818":"#1A2E18";
  el.style.color=dark?"#A8D890":"#D8EED0";
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),2500);
}

function showErr(id,msg){
  const el=document.getElementById(id);
  el.textContent=msg;
  el.style.color="#E06050";
  el.style.background=dark?"#2A1010":"#FDF0EC";
  el.style.display="block";
}
function hideErr(id){ document.getElementById(id).style.display="none"; }

// ═══════════════════════════════════════════════════
// THÈME
// ═══════════════════════════════════════════════════
function applyTheme(){
  const t=T();
  document.body.style.background=t.bg;
  document.body.style.color=t.text;

  // toggle btn
  const tog=document.getElementById("dark-toggle");
  tog.textContent=dark?"☀️ Clair":"🌙 Sombre";
  tog.style.background=t.card; tog.style.borderColor=t.border; tog.style.color=t.sub;

  // nav
  const nav=document.getElementById("nav");
  nav.style.background=t.navBg; nav.style.borderTopColor=t.border;
  document.querySelectorAll(".nav-btn .nav-label").forEach(el=>el.style.color=t.sub);
  document.querySelectorAll(".nav-btn.active .nav-label").forEach(el=>el.style.color=t.activeNav);
  document.querySelectorAll(".nav-btn.active .nav-dot").forEach(el=>el.style.background=t.activeNav);

  // hero
  const heroBg=document.getElementById("hero-bg");
  heroBg.style.background=dark?"linear-gradient(160deg,#081008 0%,#0E1E0C 50%,#142014 100%)":"linear-gradient(160deg,#122010 0%,#1A2E18 55%,#243822 100%)";
  document.getElementById("hero-season-lbl").style.color=t.heroSub;
  document.getElementById("hero-title-lbl").style.color=t.heroTxt;
  document.getElementById("hero-box-lbl").style.color=t.heroSub;
  document.querySelectorAll(".hero-stat-lbl").forEach(el=>el.style.color=t.heroSub);

function fruitStats(fid){
  const rKg=recoltes.filter(r=>r.fruit===fid).reduce((s,r)=>s+r.qte,0);
  const vKg=ventes.filter(v=>v.fruit===fid&&v.unite==="kg"&&v.type!=="don").reduce((s,v)=>s+v.qte,0);
  const dKg=ventes.filter(v=>v.fruit===fid&&v.type==="don"&&v.unite==="kg").reduce((s,v)=>s+v.qte,0);
  const vEur=ventes.filter(v=>v.fruit===fid&&v.type!=="don").reduce((s,v)=>s+v.prix,0);
  const stock=Math.max(0,rKg-vKg-dKg);
  return {rKg,vKg,dKg,vEur,stock};
}

  const t=T();
  const totalEur=ventes.filter(v=>v.type!=="don").reduce((s,v)=>s+v.prix,0);

  const nbVentes=ventes.filter(v=>v.type!=="don").length;

  document.getElementById("stat-nb").textContent=nbVentes;
  if(totalDons>0){

    document.getElementById("sep-dons").style.display="none";

  }

  document.getElementById("lbl-bilan-fruit").textContent="Bilan par fruit";

  const fc_cards=document.getElementById("fruit-cards");
  const hasData=FRUITS.some(f=>{const s=fruitStats(f.id);return s.rKg>0||s.vEur>0;});

  if(!hasData){
    fc_cards.innerHTML="";
    const empty=document.getElementById("empty-accueil");
    empty.style.display="block"; empty.style.color=t.muted;
    empty.textContent="Commence par enregistrer ta première récolte 🌱";
  } else {
    document.getElementById("empty-accueil").style.display="none";
    fc_cards.innerHTML=FRUITS.map(f=>{
      const s=fruitStats(f.id);
      if(s.rKg===0&&s.vEur===0) return "";
      const color=fc(f), bgCol=fb(f);
      const pctV=s.rKg>0?Math.min(100,(s.vKg/s.rKg)*100):0;
      const pctD=s.rKg>0?Math.min(100,(s.dKg/s.rKg)*100):0;
      const stockLine=s.stock>0?`<div class="bar-leg-item"><div class="bar-dot" style="background:${t.muted}"></div><span style="color:${dark?"#5ACA80":"#3A7A28"};font-weight:700">📦 ${s.stock.toFixed(1)} kg en stock</span></div>`:"";

// ═══════════════════════════════════════════════════
// EXPORT CSV
// ═══════════════════════════════════════════════════
function exportCSV(){
  const rows=[
    ["Type","Date","Heure","Fruit","Quantité","Unité","Prix (€)","Prix/kg (€)","Info"],
    ...recoltes.map(r=>{
      const f=getFruit(r.fruit); const[date,time]=r.datetime.split("T");
      return["Récolte",date,time?.slice(0,5)||"",f.label,r.qte,"kg","","",r.note||""];
    }),
    ...ventes.map(v=>{
      const f=getFruit(v.fruit); const[date,time]=v.datetime.split("T");
      const pxKg=v.unite==="kg"&&v.qte>0?(v.prix/v.qte).toFixed(2):"";
      return[v.type==="don"?"Don":"Vente",date,time?.slice(0,5)||"",f.label,v.qte,v.unite,v.prix.toFixed(2),pxKg,v.info||""];
    })
  ];
  const csv=rows.map(r=>r.join(";")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="garden_2026.csv"; a.click();
  URL.revokeObjectURL(url);
  showToast("📥 CSV exporté !");
}

  document.getElementById("err-analyse").style.display="none";
  document.getElementById("analyse-result").style.display="none";

  const parFruit=FRUITS.map(f=>{
    const s=fruitStats(f.id);
    const vKg=s.vKg, pxMoy=vKg>0?(s.vEur/vKg).toFixed(2):null;
    return {...f,...s,pxMoy};
  }).filter(f=>f.rKg>0||f.vEur>0);

  const totalEur=ventes.filter(v=>v.type!=="don").reduce((s,v)=>s+v.prix,0);
  const totalKgR=recoltes.reduce((s,r)=>s+r.qte,0);
  const resume=parFruit.map(f=>`${f.label}: ${f.rKg.toFixed(1)} kg récoltés, ${f.nb||0} vente(s), ${f.vEur.toFixed(2)}€${f.pxMoy?`, prix moyen ${f.pxMoy}€/kg`:""}${f.dKg>0?`, ${f.dKg.toFixed(1)} kg donnés`:""}${f.stock>0?`, ${f.stock.toFixed(1)} kg en stock`:""}`).join("\n");

  const prompt=`Tu es un ami bienveillant qui connaît bien le jardinage et la vente directe (marché, voisins, bord de route).

Bilan de la saison 2026 d'un jardinier amateur :
${resume}
Total récolté : ${totalKgR.toFixed(1)} kg · Total encaissé : ${totalEur.toFixed(2)}€

Analyse chaleureuse et concrète en 5-6 phrases : fruit le plus rentable, constat sur le stock si pertinent, conseil pour la prochaine saison, mot d'encouragement. Style direct, comme un ami. Pas de listes, texte fluide en français.`;

  try {
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})
    });
    const data=await res.json();
    const txt=data.content?.map(c=>c.text||"").join("").trim();
    if(txt){
      analyseText=txt;
      const res_box=document.getElementById("analyse-result");
      const lbl=document.getElementById("analyse-result-lbl");
      const textel=document.getElementById("analyse-text");
      const reset=document.getElementById("analyse-reset");
      lbl.textContent="💡 Ton analyse personnalisée";
      lbl.style.color=t.accentTxt;
      textel.textContent=txt;
      textel.style.color=t.text;
      reset.textContent="Relancer une analyse →";
      reset.style.color=t.sub;
      res_box.style.background=t.accentBg;
      res_box.style.borderColor=t.accentBorder;
      res_box.style.display="block";
    } else {
      showAnalyseErr("Réponse inattendue. Réessaie.");
    }
  } catch(e){
    showAnalyseErr("Erreur de connexion. Vérifie ta connexion internet.");
  }

  btn.textContent="✨ Analyser ma saison 2026";
  btn.disabled=false;
  btn.style.background=dark?"linear-gradient(135deg,#1A3A10,#2A5A18)":"linear-gradient(135deg,#1A2E18,#2A4A24)";
  btn.style.color="#C8F0B8";
}

function showAnalyseErr(msg){
  const t=T();
  const el=document.getElementById("err-analyse");
  el.textContent=msg; el.style.color="#E06050";
  el.style.background=dark?"#2A1010":"#FDF0EC";
  el.style.display="block";
}

function resetAnalyse(){
  analyseText=null;
  document.getElementById("analyse-result").style.display="none";
}
